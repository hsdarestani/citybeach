services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-citybeach} -d ${POSTGRES_DB:-citybeach}"]
      interval: 5s
      timeout: 5s
      retries: 20
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${APP_PORT:-8022}:8000"
    volumes:
      - media_data:/app/media
volumes:
  postgres_data:
  media_data:
