name: Apple-Produktionscheck im PR

on:
  pull_request:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH-Werkzeug installieren
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass >/dev/null

      - name: Apple-Produktionskonfiguration prüfen
        env:
          HOST: ${{ secrets.HOST }}
          PASS: ${{ secrets.PASS }}
          APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PRIVATE_KEY_INPUT: ${{ secrets.APPLE_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$HOST" && test -n "$PASS"
          test -n "$APPLE_CLIENT_ID" && test -n "$APPLE_KEY_ID" && test -n "$APPLE_TEAM_ID"
          test -n "$APPLE_PRIVATE_KEY_INPUT"
          REDIRECT='https://citybeach.smarbiz.sbs/accounts/apple/login/callback/'

          case "$APPLE_PRIVATE_KEY_INPUT" in
            *'BEGIN PRIVATE KEY'*)
              KEY_B64="$(printf '%s' "$APPLE_PRIVATE_KEY_INPUT" | base64 -w 0)"
              echo 'KEY_FORMAT=raw-pem'
              ;;
            *)
              KEY_B64="$(printf '%s' "$APPLE_PRIVATE_KEY_INPUT" | tr -d '[:space:]')"
              echo 'KEY_FORMAT=base64'
              ;;
          esac
          test -n "$KEY_B64"

          sshpass -p "$PASS" ssh \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            root@"$HOST" "APPLE_CLIENT_ID='$APPLE_CLIENT_ID' APPLE_KEY_ID='$APPLE_KEY_ID' APPLE_TEAM_ID='$APPLE_TEAM_ID' APPLE_REDIRECT_URI='$REDIRECT' APPLE_PRIVATE_KEY_BASE64='$KEY_B64' bash -s" <<'REMOTE'
          set -euo pipefail
          echo 'STAGE_1_SSH_OK'
          cd /root/citybeach
          echo 'STAGE_2_APP_DIR_OK'

          python3 - <<'PY'
          import os
          from pathlib import Path
          path = Path('/root/citybeach/.env')
          lines = path.read_text().splitlines()
          updates = {
              'APPLE_CLIENT_ID': os.environ['APPLE_CLIENT_ID'],
              'APPLE_KEY_ID': os.environ['APPLE_KEY_ID'],
              'APPLE_TEAM_ID': os.environ['APPLE_TEAM_ID'],
              'APPLE_REDIRECT_URI': os.environ['APPLE_REDIRECT_URI'],
              'APPLE_PRIVATE_KEY_BASE64': os.environ['APPLE_PRIVATE_KEY_BASE64'],
          }
          result, seen = [], set()
          for line in lines:
              key = line.split('=', 1)[0] if '=' in line else ''
              if key in {'APPLE_SERVICE_ID', 'APPLE_PRIVATE_KEY_B64'}:
                  continue
              if key in updates:
                  result.append(f'{key}={updates[key]}')
                  seen.add(key)
              else:
                  result.append(line)
          for key, value in updates.items():
              if key not in seen:
                  result.append(f'{key}={value}')
          path.write_text('\n'.join(result) + '\n')
          path.chmod(0o600)
          PY
          echo 'STAGE_3_ENV_OK'

          docker compose up -d --build --remove-orphans
          echo 'STAGE_4_DOCKER_OK'
          docker compose exec -T web python manage.py shell -c "from django.conf import settings; print('APPLE_LOGIN_ENABLED', settings.APPLE_LOGIN_ENABLED); print('REDIRECT_OK', settings.APPLE_REDIRECT_URI == 'https://citybeach.smarbiz.sbs/accounts/apple/login/callback/'); print('KEY_LOADED', 'BEGIN PRIVATE KEY' in settings.APPLE_PRIVATE_KEY); assert settings.APPLE_LOGIN_ENABLED"
          echo 'STAGE_5_DJANGO_OK'
          REMOTE

      - name: Öffentliche Apple-Weiterleitung prüfen
        env:
          APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
        run: |
          python3 - <<'PY'
          import os, urllib.error, urllib.parse, urllib.request
          expected_redirect = 'https://citybeach.smarbiz.sbs/accounts/apple/login/callback/'
          html = urllib.request.urlopen('https://citybeach.smarbiz.sbs/accounts/login/', timeout=30).read().decode(errors='replace')
          assert 'Mit Apple fortfahren' in html
          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, headers, newurl): return None
          opener = urllib.request.build_opener(NoRedirect)
          try:
              response = opener.open('https://citybeach.smarbiz.sbs/accounts/apple/login/', timeout=30)
              location = response.headers.get('Location', '')
          except urllib.error.HTTPError as exc:
              if exc.code not in (301, 302, 303, 307, 308): raise
              location = exc.headers.get('Location', '')
          parsed = urllib.parse.urlparse(location)
          query = urllib.parse.parse_qs(parsed.query)
          print('APPLE_HOST', parsed.netloc)
          print('CLIENT_ID_OK', query.get('client_id', [''])[0] == os.environ['APPLE_CLIENT_ID'])
          print('REDIRECT_URI_OK', query.get('redirect_uri', [''])[0] == expected_redirect)
          assert parsed.netloc == 'appleid.apple.com'
          assert query.get('client_id', [''])[0] == os.environ['APPLE_CLIENT_ID']
          assert query.get('redirect_uri', [''])[0] == expected_redirect
          PY
