name: CityBeach Nginx-Konflikt beheben

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: citybeach-nginx-fix
  cancel-in-progress: true

jobs:
  fix:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH-Werkzeug installieren
        run: sudo apt-get update && sudo apt-get install -y sshpass curl

      - name: Nginx bereinigen und HTTPS aktivieren
        env:
          HOST: ${{ secrets.HOST }}
          PASS: ${{ secrets.PASS }}
          DOMAIN: citybeach.smarbiz.sbs
        run: |
          set -euo pipefail
          sshpass -p "$PASS" ssh \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            root@"$HOST" "DOMAIN='$DOMAIN' bash -s" <<'REMOTE'
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y nginx certbot python3-certbot-nginx curl openssl

          rm -f /etc/nginx/sites-enabled/*
          rm -f /etc/nginx/sites-available/citybeach-public

          cat >/etc/nginx/sites-available/citybeach <<NGINX
          server {
              listen 80 default_server;
              listen [::]:80 default_server;
              server_name $DOMAIN 91.107.155.215 _;
              client_max_body_size 20M;
              location / {
                  proxy_pass http://127.0.0.1:8022;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
              }
          }
          NGINX

          ln -sfn /etc/nginx/sites-available/citybeach /etc/nginx/sites-enabled/citybeach
          nginx -t
          systemctl enable --now nginx
          systemctl restart nginx
          curl -fsS -H "Host: $DOMAIN" http://127.0.0.1/health/

          CERT_OK=0
          if [ -f "/etc/letsencrypt/live/$DOMAIN/fullchain.pem" ] && [ -f "/etc/letsencrypt/live/$DOMAIN/privkey.pem" ]; then
            CERT_OK=1
          elif certbot --nginx \
            --non-interactive \
            --agree-tos \
            --register-unsafely-without-email \
            --redirect \
            --keep-until-expiring \
            -d "$DOMAIN"; then
            CERT_OK=1
          fi

          rm -f /etc/nginx/sites-enabled/*
          if [ "$CERT_OK" = '1' ]; then
            cat >/etc/nginx/sites-available/citybeach <<NGINX
          server {
              listen 80 default_server;
              listen [::]:80 default_server;
              server_name $DOMAIN 91.107.155.215 _;
              return 301 https://$DOMAIN\$request_uri;
          }
          server {
              listen 443 ssl http2 default_server;
              listen [::]:443 ssl http2 default_server;
              server_name $DOMAIN 91.107.155.215 _;
              client_max_body_size 20M;
              ssl_certificate /etc/letsencrypt/live/$DOMAIN/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/$DOMAIN/privkey.pem;
              include /etc/letsencrypt/options-ssl-nginx.conf;
              ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
              location / {
                  proxy_pass http://127.0.0.1:8022;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto https;
              }
          }
          NGINX
          else
            mkdir -p /etc/nginx/ssl
            openssl req -x509 -nodes -newkey rsa:2048 -days 30 \
              -keyout /etc/nginx/ssl/citybeach.key \
              -out /etc/nginx/ssl/citybeach.crt \
              -subj "/CN=$DOMAIN" \
              -addext "subjectAltName=DNS:$DOMAIN"
            cat >/etc/nginx/sites-available/citybeach <<NGINX
          server {
              listen 80 default_server;
              listen [::]:80 default_server;
              server_name $DOMAIN 91.107.155.215 _;
              location / {
                  proxy_pass http://127.0.0.1:8022;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Forwarded-Proto http;
              }
          }
          server {
              listen 443 ssl http2 default_server;
              listen [::]:443 ssl http2 default_server;
              server_name $DOMAIN 91.107.155.215 _;
              ssl_certificate /etc/nginx/ssl/citybeach.crt;
              ssl_certificate_key /etc/nginx/ssl/citybeach.key;
              location / {
                  proxy_pass http://127.0.0.1:8022;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto https;
              }
          }
          NGINX
          fi

          ln -sfn /etc/nginx/sites-available/citybeach /etc/nginx/sites-enabled/citybeach
          nginx -t
          systemctl restart nginx
          ss -lntp | grep -E ':(80|443) '
          curl -kfsS --resolve "$DOMAIN:443:127.0.0.1" "https://$DOMAIN/health/"
          REMOTE

      - name: Öffentliche Adresse prüfen
        env:
          DOMAIN: citybeach.smarbiz.sbs
        run: |
          set -euo pipefail
          for i in $(seq 1 12); do
            if curl -fsS --connect-timeout 10 --max-time 25 "https://$DOMAIN/health/"; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Ergebnis melden
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BODY="CityBeach Nginx-Konfliktbehebung: **${STATUS}**%0A%0AAdresse: https://citybeach.smarbiz.sbs%0AAusführung: ${RUN_URL}"
          curl -fsS -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/12/comments" \
            -d "{\"body\":\"${BODY}\"}"
