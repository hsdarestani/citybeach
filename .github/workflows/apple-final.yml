name: CityBeach Apple-Anmeldung final prüfen

on:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH-Werkzeug installieren
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Apple-Einstellungen auf Production aktivieren
        env:
          HOST: ${{ secrets.HOST }}
          PASS: ${{ secrets.PASS }}
          APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_REDIRECT_URI_INPUT: ${{ secrets.APPLE_REDIRECT_URI }}
          APPLE_PRIVATE_KEY_INPUT: ${{ secrets.APPLE_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$HOST" && test -n "$PASS"
          test -n "$APPLE_CLIENT_ID" && test -n "$APPLE_KEY_ID" && test -n "$APPLE_TEAM_ID"
          test -n "$APPLE_REDIRECT_URI_INPUT" && test -n "$APPLE_PRIVATE_KEY_INPUT"

          APPLE_REDIRECT_URI="${APPLE_REDIRECT_URI_INPUT%/}/"
          test "$APPLE_REDIRECT_URI" = "https://citybeach.smarbiz.sbs/accounts/apple/login/callback/"

          if printf '%s' "$APPLE_PRIVATE_KEY_INPUT" | grep -q 'BEGIN PRIVATE KEY'; then
            APPLE_PRIVATE_KEY_CANONICAL="$(printf '%s' "$APPLE_PRIVATE_KEY_INPUT" | base64 -w 0)"
          else
            APPLE_PRIVATE_KEY_CANONICAL="$(printf '%s' "$APPLE_PRIVATE_KEY_INPUT" | tr -d '[:space:]')"
          fi
          test -n "$APPLE_PRIVATE_KEY_CANONICAL"

          sshpass -p "$PASS" ssh \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            root@"$HOST" "APPLE_CLIENT_ID='$APPLE_CLIENT_ID' APPLE_KEY_ID='$APPLE_KEY_ID' APPLE_TEAM_ID='$APPLE_TEAM_ID' APPLE_REDIRECT_URI='$APPLE_REDIRECT_URI' APPLE_PRIVATE_KEY_BASE64='$APPLE_PRIVATE_KEY_CANONICAL' bash -s" <<'REMOTE'
          set -euo pipefail
          cd /root/citybeach
          git fetch --depth 1 origin main
          git reset --hard FETCH_HEAD

          python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path('/root/citybeach/.env')
          current = path.read_text().splitlines() if path.exists() else []
          values = {
              'DJANGO_ALLOWED_HOSTS': 'citybeach.smarbiz.sbs,91.107.155.215,127.0.0.1,localhost',
              'DJANGO_CSRF_TRUSTED_ORIGINS': 'https://citybeach.smarbiz.sbs,http://91.107.155.215',
              'DJANGO_SECURE_COOKIES': '1',
              'DJANGO_HSTS_SECONDS': '31536000',
              'APPLE_CLIENT_ID': os.environ['APPLE_CLIENT_ID'],
              'APPLE_KEY_ID': os.environ['APPLE_KEY_ID'],
              'APPLE_TEAM_ID': os.environ['APPLE_TEAM_ID'],
              'APPLE_REDIRECT_URI': os.environ['APPLE_REDIRECT_URI'],
              'APPLE_PRIVATE_KEY_BASE64': os.environ['APPLE_PRIVATE_KEY_BASE64'],
          }
          obsolete = {'APPLE_SERVICE_ID', 'APPLE_PRIVATE_KEY_B64'}
          result = []
          written = set()
          for line in current:
              key = line.split('=', 1)[0] if '=' in line else ''
              if key in obsolete:
                  continue
              if key in values:
                  result.append(f'{key}={values[key]}')
                  written.add(key)
              else:
                  result.append(line)
          for key, value in values.items():
              if key not in written:
                  result.append(f'{key}={value}')
          path.write_text('\n'.join(result) + '\n')
          path.chmod(0o600)
          PY

          docker compose up -d --build --remove-orphans
          docker compose exec -T web python manage.py seed_demo
          docker compose exec -T web python manage.py shell -c "from django.conf import settings; assert settings.APPLE_LOGIN_ENABLED, 'Apple login disabled'; assert settings.APPLE_CLIENT_ID; assert settings.APPLE_KEY_ID; assert settings.APPLE_TEAM_ID; assert settings.APPLE_REDIRECT_URI == 'https://citybeach.smarbiz.sbs/accounts/apple/login/callback/'; assert 'BEGIN PRIVATE KEY' in settings.APPLE_PRIVATE_KEY"
          curl -fsS http://127.0.0.1:8022/health/
          REMOTE

      - name: Live-Weiterleitung zu Apple prüfen
        env:
          APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
          APPLE_REDIRECT_URI: ${{ secrets.APPLE_REDIRECT_URI }}
        run: |
          python3 - <<'PY'
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          html = urllib.request.urlopen('https://citybeach.smarbiz.sbs/accounts/login/', timeout=30).read().decode(errors='replace')
          assert 'Mit Apple fortfahren' in html

          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, headers, newurl):
                  return None

          opener = urllib.request.build_opener(NoRedirect)
          request = urllib.request.Request(
              'https://citybeach.smarbiz.sbs/accounts/apple/login/',
              headers={'User-Agent': 'CityBeach Apple Live Check'},
          )
          try:
              response = opener.open(request, timeout=30)
              location = response.headers.get('Location', '')
          except urllib.error.HTTPError as exc:
              if exc.code not in (301, 302, 303, 307, 308):
                  raise
              location = exc.headers.get('Location', '')

          parsed = urllib.parse.urlparse(location)
          query = urllib.parse.parse_qs(parsed.query)
          assert parsed.scheme == 'https'
          assert parsed.netloc == 'appleid.apple.com'
          assert parsed.path.startswith('/auth/authorize')
          assert query.get('client_id', [''])[0] == os.environ['APPLE_CLIENT_ID']
          assert query.get('redirect_uri', [''])[0] == os.environ['APPLE_REDIRECT_URI'].rstrip('/') + '/'
          print('CITYBEACH_APPLE_LOGIN_OK=1')
          PY

      - name: Ergebnis in Issue 15 ثبت کن
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          success = os.environ['STATUS'] == 'success'
          body = (
              '## CityBeach Apple-Anmeldung\n\n'
              f"- Production: **{'erfolgreich' if success else 'fehlgeschlagen'}**\n"
              f"- Apple-Verbindung: **{'vollständig geprüft' if success else 'nicht bestätigt'}**\n"
              f"- Stand: `{os.environ['SHA']}`\n"
              f"- Ausführung: {os.environ['RUN_URL']}\n"
              '- Adresse: https://citybeach.smarbiz.sbs/accounts/login/\n'
          )
          request = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/issues/15",
              data=json.dumps({'body': body}).encode(),
              headers={'Authorization': f"Bearer {os.environ['GH_TOKEN']}", 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json'},
              method='PATCH',
          )
          urllib.request.urlopen(request).read()
          PY
