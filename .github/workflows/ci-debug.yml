name: CityBeach Einzelprüfungen

on:
  pull_request:

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt
      - name: Migrationen erzeugungsfrei prüfen
        env:
          DJANGO_DEBUG: '1'
          DJANGO_ALLOWED_HOSTS: testserver,localhost,127.0.0.1
        run: python manage.py makemigrations --check --dry-run
      - name: Migrationen anwenden
        env:
          DJANGO_DEBUG: '1'
          DJANGO_ALLOWED_HOSTS: testserver,localhost,127.0.0.1
        run: python manage.py migrate --noinput
      - name: Tests ausführen
        id: tests
        continue-on-error: true
        env:
          DJANGO_DEBUG: '1'
          DJANGO_ALLOWED_HOSTS: testserver,localhost,127.0.0.1
        run: python manage.py test -v 2 2>&1 | tee /tmp/citybeach-tests.log
      - name: Fehlerdetails veröffentlichen
        if: steps.tests.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import urllib.request

          lines = pathlib.Path('/tmp/citybeach-tests.log').read_text(errors='replace').splitlines()[-140:]
          body = '### Aktueller Testfehler\n\n```text\n' + '\n'.join(lines) + '\n```'
          request = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/issues/{os.environ['PR_NUMBER']}/comments",
              data=json.dumps({'body': body}).encode(),
              headers={
                  'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
                  'Accept': 'application/vnd.github+json',
                  'Content-Type': 'application/json',
              },
              method='POST',
          )
          urllib.request.urlopen(request).read()
          PY
      - name: Teststatus erzwingen
        if: steps.tests.outcome == 'failure'
        run: exit 1
      - name: Statische Dateien sammeln
        env:
          DJANGO_DEBUG: '1'
          DJANGO_ALLOWED_HOSTS: testserver,localhost,127.0.0.1
        run: python manage.py collectstatic --noinput
