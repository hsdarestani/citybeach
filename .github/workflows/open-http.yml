name: Open CityBeach HTTP
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  issues: write
jobs:
  open-and-verify:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Install SSH client
        run: sudo apt-get update && sudo apt-get install -y sshpass
      - name: Open HTTP and verify Nginx
        env:
          HOST: ${{ secrets.HOST }}
          PASS: ${{ secrets.PASS }}
        run: |
          test -n "$HOST" && test -n "$PASS"
          sshpass -p "$PASS" ssh -o ConnectTimeout=15 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@"$HOST" "CITY_HOST='$HOST' bash -s" <<'REMOTE'
          set -euo pipefail
          if command -v ufw >/dev/null 2>&1; then
            ufw allow 22/tcp || true
            ufw allow 80/tcp || true
          fi
          iptables -C INPUT -p tcp --dport 80 -j ACCEPT 2>/dev/null || iptables -I INPUT 1 -p tcp --dport 80 -j ACCEPT
          ip6tables -C INPUT -p tcp --dport 80 -j ACCEPT 2>/dev/null || ip6tables -I INPUT 1 -p tcp --dport 80 -j ACCEPT || true
          rm -f /etc/nginx/sites-enabled/default
          sed -i 's/listen 80;/listen 80 default_server;/' /etc/nginx/sites-available/citybeach
          sed -i 's/server_name .*/server_name _;/' /etc/nginx/sites-available/citybeach
          nginx -t
          systemctl restart nginx
          ss -ltnp | grep ':80 '
          curl -fsS --retry 5 --retry-delay 2 -H "Host: ${CITY_HOST}" http://127.0.0.1/health/
          REMOTE
          curl -fsS --connect-timeout 10 --max-time 20 --retry 5 --retry-delay 5 "http://${HOST}/health/"
      - name: Report network result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BODY="CityBeach public network repair: **${STATUS}**%0A%0ATarget: http://91.107.155.215%0ARun: ${RUN_URL}"
          curl -fsS -X POST -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/2/comments" -d "{\"body\":\"${BODY}\"}"
