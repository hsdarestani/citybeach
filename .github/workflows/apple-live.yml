name: Apple-Anmeldung produktiv aktivieren

on:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  activate:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Werkzeuge installieren
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Apple-Schlüssel normalisieren und prüfen
        env:
          APPLE_PRIVATE_KEY_INPUT: ${{ secrets.APPLE_PRIVATE_KEY_BASE64 }}
          APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_REDIRECT_URI_INPUT: ${{ secrets.APPLE_REDIRECT_URI }}
        run: |
          set -euo pipefail
          test -n "$APPLE_CLIENT_ID"
          test -n "$APPLE_KEY_ID"
          test -n "$APPLE_TEAM_ID"
          test -n "$APPLE_REDIRECT_URI_INPUT"
          test -n "$APPLE_PRIVATE_KEY_INPUT"
          test "${APPLE_REDIRECT_URI_INPUT%/}/" = "https://citybeach.smarbiz.sbs/accounts/apple/login/callback/"

          python3 - <<'PY'
          import base64
          import os
          import pathlib
          import re
          import sys
          import textwrap

          raw = os.environ['APPLE_PRIVATE_KEY_INPUT'].lstrip('\ufeff').strip()
          raw = raw.replace('\\n', '\n').strip().strip('"').strip("'")

          def body_from_pem(text):
              match = re.search(
                  r'-----BEGIN PRIVATE KEY-----\s*(.*?)\s*-----END PRIVATE KEY-----',
                  text,
                  flags=re.S,
              )
              return re.sub(r'\s+', '', match.group(1)) if match else None

          body = body_from_pem(raw)
          if body is None:
              compact = re.sub(r'\s+', '', raw)
              try:
                  decoded = base64.b64decode(compact, validate=True)
              except Exception as exc:
                  raise SystemExit('APPLE_PRIVATE_KEY_BASE64 قابل تبدیل به کلید Apple نیست.') from exc
              try:
                  decoded_text = decoded.decode('utf-8').lstrip('\ufeff')
              except UnicodeDecodeError:
                  decoded_text = ''
              body = body_from_pem(decoded_text)
              if body is None:
                  if not decoded.startswith(b'0'):
                      raise SystemExit('مقدار Secret یک کلید PKCS#8 معتبر نیست.')
                  body = base64.b64encode(decoded).decode()

          try:
              der = base64.b64decode(body, validate=True)
          except Exception as exc:
              raise SystemExit('بدنه کلید Apple معتبر نیست.') from exc
          if not der.startswith(b'0'):
              raise SystemExit('ساختار DER کلید Apple معتبر نیست.')

          pem = (
              '-----BEGIN PRIVATE KEY-----\n'
              + '\n'.join(textwrap.wrap(base64.b64encode(der).decode(), 64))
              + '\n-----END PRIVATE KEY-----\n'
          )
          pathlib.Path('/tmp/apple-key.p8').write_text(pem)
          pathlib.Path('/tmp/apple-key.b64').write_text(base64.b64encode(pem.encode()).decode())
          PY

          openssl pkey -in /tmp/apple-key.p8 -noout
          echo "APPLE_PRIVATE_KEY_CANONICAL=$(cat /tmp/apple-key.b64)" >> "$GITHUB_ENV"
          rm -f /tmp/apple-key.p8 /tmp/apple-key.b64

      - name: تنظیم و راه‌اندازی روی Hetzner
        env:
          HOST: ${{ secrets.HOST }}
          PASS: ${{ secrets.PASS }}
          APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_REDIRECT_URI: ${{ secrets.APPLE_REDIRECT_URI }}
        run: |
          set -euo pipefail
          test -n "$HOST" && test -n "$PASS"
          REDIRECT="${APPLE_REDIRECT_URI%/}/"
          sshpass -p "$PASS" ssh \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            root@"$HOST" "APPLE_CLIENT_ID='$APPLE_CLIENT_ID' APPLE_KEY_ID='$APPLE_KEY_ID' APPLE_TEAM_ID='$APPLE_TEAM_ID' APPLE_REDIRECT_URI='$REDIRECT' APPLE_PRIVATE_KEY_BASE64='$APPLE_PRIVATE_KEY_CANONICAL' bash -s" <<'REMOTE'
          set -euo pipefail
          cd /root/citybeach
          git fetch --depth 1 origin main
          git reset --hard FETCH_HEAD

          python3 - <<'PY'
          import os
          from pathlib import Path

          env_path = Path('/root/citybeach/.env')
          lines = env_path.read_text().splitlines() if env_path.exists() else []
          updates = {
              'DJANGO_ALLOWED_HOSTS': 'citybeach.smarbiz.sbs,91.107.155.215,127.0.0.1,localhost',
              'DJANGO_CSRF_TRUSTED_ORIGINS': 'https://citybeach.smarbiz.sbs,http://91.107.155.215',
              'DJANGO_SECURE_COOKIES': '1',
              'DJANGO_HSTS_SECONDS': '31536000',
              'APPLE_CLIENT_ID': os.environ['APPLE_CLIENT_ID'],
              'APPLE_KEY_ID': os.environ['APPLE_KEY_ID'],
              'APPLE_TEAM_ID': os.environ['APPLE_TEAM_ID'],
              'APPLE_REDIRECT_URI': os.environ['APPLE_REDIRECT_URI'],
              'APPLE_PRIVATE_KEY_BASE64': os.environ['APPLE_PRIVATE_KEY_BASE64'],
          }
          obsolete = {'APPLE_SERVICE_ID', 'APPLE_PRIVATE_KEY_B64'}
          output = []
          seen = set()
          for line in lines:
              key = line.split('=', 1)[0] if '=' in line else ''
              if key in obsolete:
                  continue
              if key in updates:
                  output.append(f'{key}={updates[key]}')
                  seen.add(key)
              else:
                  output.append(line)
          for key, value in updates.items():
              if key not in seen:
                  output.append(f'{key}={value}')
          env_path.write_text('\n'.join(output) + '\n')
          env_path.chmod(0o600)
          PY

          docker compose up -d --build --remove-orphans
          docker compose exec -T web python manage.py seed_demo
          docker compose exec -T web python manage.py shell -c "from django.conf import settings; assert settings.APPLE_LOGIN_ENABLED; assert settings.APPLE_CLIENT_ID; assert settings.APPLE_REDIRECT_URI == 'https://citybeach.smarbiz.sbs/accounts/apple/login/callback/'; assert 'BEGIN PRIVATE KEY' in settings.APPLE_PRIVATE_KEY"
          curl -fsS http://127.0.0.1:8022/health/
          REMOTE

      - name: اتصال عمومی Apple را بررسی کن
        env:
          APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
          APPLE_REDIRECT_URI: ${{ secrets.APPLE_REDIRECT_URI }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          login_url = 'https://citybeach.smarbiz.sbs/accounts/login/'
          apple_url = 'https://citybeach.smarbiz.sbs/accounts/apple/login/'
          expected_redirect = os.environ['APPLE_REDIRECT_URI'].rstrip('/') + '/'
          expected_client = os.environ['APPLE_CLIENT_ID']

          html = urllib.request.urlopen(login_url, timeout=30).read().decode(errors='replace')
          assert 'Mit Apple fortfahren' in html

          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, headers, newurl):
                  return None

          opener = urllib.request.build_opener(NoRedirect)
          try:
              response = opener.open(urllib.request.Request(apple_url, headers={'User-Agent': 'CityBeach Apple Check'}), timeout=30)
              location = response.headers.get('Location', '')
          except urllib.error.HTTPError as exc:
              if exc.code not in (301, 302, 303, 307, 308):
                  raise
              location = exc.headers.get('Location', '')

          parsed = urllib.parse.urlparse(location)
          query = urllib.parse.parse_qs(parsed.query)
          assert parsed.netloc == 'appleid.apple.com'
          assert query.get('client_id', [''])[0] == expected_client
          assert query.get('redirect_uri', [''])[0] == expected_redirect
          print('APPLE_LOGIN_LIVE_OK=1')
          PY

      - name: وضعیت را ثبت کن
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          success = os.environ['JOB_STATUS'] == 'success'
          body = (
              '## CityBeach Produktionsstatus\n\n'
              f"- Bereitstellung: **{'erfolgreich' if success else 'fehlgeschlagen'}**\n"
              f"- Apple-Anmeldung: **{'verbunden und geprüft' if success else 'nicht bestätigt'}**\n"
              f"- Stand: `{os.environ['SHA']}`\n"
              f"- Ausführung: {os.environ['RUN_URL']}\n"
              '- Adresse: https://citybeach.smarbiz.sbs\n'
          )
          request = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/issues/2",
              data=json.dumps({'body': body}).encode(),
              headers={'Authorization': f"Bearer {os.environ['GH_TOKEN']}", 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json'},
              method='PATCH',
          )
          urllib.request.urlopen(request).read()
          PY
