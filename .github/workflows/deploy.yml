name: CityBeach testen und bereitstellen

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt
      - name: Migrationen prüfen
        env:
          DJANGO_DEBUG: '1'
          DJANGO_ALLOWED_HOSTS: testserver,localhost,127.0.0.1
        run: |
          python manage.py makemigrations --check --dry-run
          python manage.py migrate --noinput
      - name: Automatische Prüfungen ausführen
        id: tests
        continue-on-error: true
        env:
          DJANGO_DEBUG: '1'
          DJANGO_ALLOWED_HOSTS: testserver,localhost,127.0.0.1
        run: python manage.py test -v 2 2>&1 | tee /tmp/citybeach-tests.log
      - name: Fehlerausgabe im Pull Request veröffentlichen
        if: steps.tests.outcome == 'failure' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python - <<'PY'
          import json, os, pathlib, urllib.request
          lines = pathlib.Path('/tmp/citybeach-tests.log').read_text(errors='replace').splitlines()[-120:]
          body = '### Fehlgeschlagene automatische Prüfung\n\n```text\n' + '\n'.join(lines) + '\n```'
          request = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/issues/{os.environ['PR_NUMBER']}/comments",
              data=json.dumps({'body': body}).encode(),
              headers={
                  'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
                  'Accept': 'application/vnd.github+json',
                  'Content-Type': 'application/json',
              },
              method='POST',
          )
          urllib.request.urlopen(request).read()
          PY
      - name: Prüfung bei Fehler beenden
        if: steps.tests.outcome == 'failure'
        run: exit 1
      - name: Statische Dateien sammeln
        env:
          DJANGO_DEBUG: '1'
          DJANGO_ALLOWED_HOSTS: testserver,localhost,127.0.0.1
        run: python manage.py collectstatic --noinput

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH-Werkzeug installieren
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Apple-Geheimnisse prüfen und normalisieren
        env:
          APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_REDIRECT_URI_INPUT: ${{ secrets.APPLE_REDIRECT_URI }}
          APPLE_PRIVATE_KEY_INPUT: ${{ secrets.APPLE_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$APPLE_CLIENT_ID"
          test -n "$APPLE_KEY_ID"
          test -n "$APPLE_TEAM_ID"
          test -n "$APPLE_REDIRECT_URI_INPUT"
          test -n "$APPLE_PRIVATE_KEY_INPUT"

          NORMALIZED_REDIRECT="${APPLE_REDIRECT_URI_INPUT%/}/"
          EXPECTED_REDIRECT="https://citybeach.smarbiz.sbs/accounts/apple/login/callback/"
          test "$NORMALIZED_REDIRECT" = "$EXPECTED_REDIRECT" || {
            echo 'APPLE_REDIRECT_URI stimmt nicht mit der CityBeach-Rücksprungadresse überein.'
            exit 1
          }

          APPLE_PRIVATE_KEY_CANONICAL="$(python3 - <<'PY'
          import base64
          import os
          import sys
          import textwrap

          value = os.environ.get('APPLE_PRIVATE_KEY_INPUT', '').strip().replace('\\n', '\n')
          if not value:
              sys.exit('Der Apple-Schlüssel ist leer.')

          if '-----BEGIN PRIVATE KEY-----' in value:
              pem = value.strip() + '\n'
          else:
              compact = ''.join(value.split())
              try:
                  decoded = base64.b64decode(compact, validate=True)
              except Exception:
                  sys.exit('Der Apple-Schlüssel hat kein unterstütztes Format.')

              if b'-----BEGIN PRIVATE KEY-----' in decoded:
                  pem = decoded.decode('utf-8').strip() + '\n'
              elif decoded.startswith(b'0'):
                  pem = (
                      '-----BEGIN PRIVATE KEY-----\n'
                      + '\n'.join(textwrap.wrap(compact, 64))
                      + '\n-----END PRIVATE KEY-----\n'
                  )
              else:
                  sys.exit('Der Apple-Schlüssel ist kein gültiger PKCS#8-Schlüssel.')

          print(base64.b64encode(pem.encode()).decode())
          PY
          )"

          printf '%s' "$APPLE_PRIVATE_KEY_CANONICAL" | base64 --decode > /tmp/citybeach-apple-key.p8
          openssl pkey -in /tmp/citybeach-apple-key.p8 -noout >/dev/null
          rm -f /tmp/citybeach-apple-key.p8

          echo "APPLE_PRIVATE_KEY_CANONICAL=$APPLE_PRIVATE_KEY_CANONICAL" >> "$GITHUB_ENV"
          echo "APPLE_REDIRECT_URI_NORMALIZED=$NORMALIZED_REDIRECT" >> "$GITHUB_ENV"

      - name: Auf Hetzner bereitstellen
        env:
          HOST: ${{ secrets.HOST }}
          PASS: ${{ secrets.PASS }}
          DOMAIN: citybeach.smarbiz.sbs
          APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          test -n "$HOST" && test -n "$PASS"
          sshpass -p "$PASS" ssh \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            root@"$HOST" "CITY_HOST='$HOST' CITY_DOMAIN='$DOMAIN' APPLE_CLIENT_ID='$APPLE_CLIENT_ID' APPLE_KEY_ID='$APPLE_KEY_ID' APPLE_TEAM_ID='$APPLE_TEAM_ID' APPLE_REDIRECT_URI='$APPLE_REDIRECT_URI_NORMALIZED' APPLE_PRIVATE_KEY_BASE64='$APPLE_PRIVATE_KEY_CANONICAL' bash -s" <<'REMOTE'
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive

          apt-get update
          apt-get install -y git curl docker.io docker-compose-v2 nginx openssl
          systemctl enable --now docker nginx

          APP_DIR=/root/citybeach
          ENV_FILE="$APP_DIR/.env"
          mkdir -p "$APP_DIR"
          cd "$APP_DIR"

          if [ ! -d .git ]; then
            git init
            git remote add origin https://github.com/hsdarestani/citybeach.git
          fi
          git fetch --depth 1 origin main
          git reset --hard FETCH_HEAD

          if [ ! -f "$ENV_FILE" ]; then
            DJANGO_KEY="$(openssl rand -base64 48 | tr -d '\n')"
            DB_PASSWORD="$(openssl rand -hex 24)"
            OWNER_PASSWORD="$(openssl rand -base64 18 | tr -dc 'A-Za-z0-9@!_-')"
            STAFF_PASSWORD="$(openssl rand -base64 18 | tr -dc 'A-Za-z0-9@!_-')"
            CUSTOMER_PASSWORD="$(openssl rand -base64 18 | tr -dc 'A-Za-z0-9@!_-')"
            printf '%s\n' \
              "DJANGO_SECRET_KEY=$DJANGO_KEY" \
              "DJANGO_DEBUG=0" \
              "DATABASE_URL=postgresql://citybeach:$DB_PASSWORD@db:5432/citybeach" \
              "POSTGRES_DB=citybeach" \
              "POSTGRES_USER=citybeach" \
              "POSTGRES_PASSWORD=$DB_PASSWORD" \
              "APP_PORT=8022" \
              "CITYBEACH_OWNER_PASSWORD=$OWNER_PASSWORD" \
              "CITYBEACH_STAFF_PASSWORD=$STAFF_PASSWORD" \
              "CITYBEACH_CUSTOMER_PASSWORD=$CUSTOMER_PASSWORD" > "$ENV_FILE"
            chmod 600 "$ENV_FILE"
          fi

          set_env() {
            key="$1"
            value="$2"
            if grep -q "^${key}=" "$ENV_FILE"; then
              sed -i "s|^${key}=.*|${key}=${value}|" "$ENV_FILE"
            else
              printf '%s=%s\n' "$key" "$value" >> "$ENV_FILE"
            fi
          }

          sed -i '/^APPLE_SERVICE_ID=/d; /^APPLE_PRIVATE_KEY_B64=/d' "$ENV_FILE"
          set_env DJANGO_ALLOWED_HOSTS "$CITY_DOMAIN,$CITY_HOST,127.0.0.1,localhost"
          set_env DJANGO_CSRF_TRUSTED_ORIGINS "https://$CITY_DOMAIN,http://$CITY_HOST"
          set_env DJANGO_SECURE_COOKIES "1"
          set_env DJANGO_HSTS_SECONDS "31536000"
          set_env APPLE_CLIENT_ID "$APPLE_CLIENT_ID"
          set_env APPLE_KEY_ID "$APPLE_KEY_ID"
          set_env APPLE_TEAM_ID "$APPLE_TEAM_ID"
          set_env APPLE_REDIRECT_URI "$APPLE_REDIRECT_URI"
          set_env APPLE_PRIVATE_KEY_BASE64 "$APPLE_PRIVATE_KEY_BASE64"

          docker compose up -d --build --remove-orphans
          docker compose exec -T web python manage.py seed_demo
          docker compose exec -T web python manage.py shell -c "from django.conf import settings; assert settings.APPLE_LOGIN_ENABLED; assert settings.APPLE_REDIRECT_URI == 'https://citybeach.smarbiz.sbs/accounts/apple/login/callback/'; assert 'BEGIN PRIVATE KEY' in settings.APPLE_PRIVATE_KEY"

          set -a
          . "$ENV_FILE"
          set +a
          printf '%s\n' \
            "CityBeach Frankfurt – Demozugänge" \
            "Adresse: https://$CITY_DOMAIN" \
            "Ersatzadresse: http://$CITY_HOST" \
            "Inhaber: owner / $CITYBEACH_OWNER_PASSWORD" \
            "Mitarbeiter: staff / $CITYBEACH_STAFF_PASSWORD" \
            "Kunde: customer / $CITYBEACH_CUSTOMER_PASSWORD" > "$APP_DIR/.initial-credentials"
          chmod 600 "$APP_DIR/.initial-credentials"

          rm -f /etc/nginx/sites-enabled/default /etc/nginx/sites-enabled/citybeach-public
          ln -sfn /etc/nginx/sites-available/citybeach /etc/nginx/sites-enabled/citybeach
          nginx -t
          systemctl reload nginx

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8022/health/ >/dev/null; then break; fi
            sleep 3
          done
          curl -fsS http://127.0.0.1:8022/health/
          REMOTE

      - name: Apple-Anmeldung öffentlich prüfen
        env:
          DOMAIN: citybeach.smarbiz.sbs
          APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
          APPLE_REDIRECT_URI: ${{ secrets.APPLE_REDIRECT_URI }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          domain = os.environ['DOMAIN']
          client_id = os.environ['APPLE_CLIENT_ID']
          redirect_uri = os.environ['APPLE_REDIRECT_URI'].rstrip('/') + '/'

          login_html = urllib.request.urlopen(
              f'https://{domain}/accounts/login/', timeout=30
          ).read().decode('utf-8', errors='replace')
          assert 'Mit Apple fortfahren' in login_html

          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, headers, newurl):
                  return None

          opener = urllib.request.build_opener(NoRedirect)
          request = urllib.request.Request(
              f'https://{domain}/accounts/apple/login/',
              headers={'User-Agent': 'CityBeach-Bereitstellungsprüfung'},
          )
          try:
              response = opener.open(request, timeout=30)
              location = response.headers.get('Location', '')
          except urllib.error.HTTPError as exc:
              if exc.code not in (301, 302, 303, 307, 308):
                  raise
              location = exc.headers.get('Location', '')

          parsed = urllib.parse.urlparse(location)
          assert parsed.scheme == 'https'
          assert parsed.netloc == 'appleid.apple.com'
          assert parsed.path.startswith('/auth/authorize')
          query = urllib.parse.parse_qs(parsed.query)
          assert query.get('client_id', [''])[0] == client_id
          assert query.get('redirect_uri', [''])[0] == redirect_uri
          print('APPLE_AUTHORIZATION_OK=1')
          PY

      - name: Ergebnis melden
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          successful = os.environ['JOB_STATUS'] == 'success'
          body = (
              '## CityBeach Produktionsstatus\n\n'
              f"- Bereitstellung: **{'erfolgreich' if successful else 'fehlgeschlagen'}**\n"
              f"- Apple-Anmeldung: **{'verbunden und geprüft' if successful else 'nicht bestätigt'}**\n"
              f"- Stand: `{os.environ['SHA']}`\n"
              f"- Ausführung: {os.environ['RUN_URL']}\n"
              '- Adresse: https://citybeach.smarbiz.sbs\n'
          )
          request = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/issues/2",
              data=json.dumps({'body': body}).encode(),
              headers={
                  'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
                  'Accept': 'application/vnd.github+json',
                  'Content-Type': 'application/json',
              },
              method='PATCH',
          )
          urllib.request.urlopen(request).read()
          PY
