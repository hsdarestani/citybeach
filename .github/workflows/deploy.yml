name: CityBeach prüfen und bereitstellen

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

concurrency:
  group: citybeach-production
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt
      - name: Migrationen prüfen
        env:
          DJANGO_DEBUG: '1'
          DJANGO_ALLOWED_HOSTS: testserver,localhost,127.0.0.1
        run: python manage.py makemigrations --check --dry-run
      - name: Migrationen anwenden
        env:
          DJANGO_DEBUG: '1'
          DJANGO_ALLOWED_HOSTS: testserver,localhost,127.0.0.1
        run: python manage.py migrate --noinput
      - name: Automatische Tests ausführen
        env:
          DJANGO_DEBUG: '1'
          DJANGO_ALLOWED_HOSTS: testserver,localhost,127.0.0.1
        run: python manage.py test -v 2
      - name: Statische Dateien sammeln
        env:
          DJANGO_DEBUG: '1'
          DJANGO_ALLOWED_HOSTS: testserver,localhost,127.0.0.1
        run: python manage.py collectstatic --noinput

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH-Werkzeug installieren
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass >/dev/null

      - name: Auf Hetzner bereitstellen und Apple prüfen
        env:
          HOST: ${{ secrets.HOST }}
          PASS: ${{ secrets.PASS }}
        run: |
          set -euo pipefail
          test -n "$HOST" && test -n "$PASS"
          sshpass -p "$PASS" ssh \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            root@"$HOST" bash -s <<'REMOTE'
          set -euo pipefail
          cd /root/citybeach
          test -f .env

          set_env() {
            key="$1"
            value="$2"
            if grep -q "^${key}=" .env; then
              sed -i "s|^${key}=.*|${key}=${value}|" .env
            else
              printf '%s=%s\n' "$key" "$value" >> .env
            fi
          }

          set_env APPLE_REDIRECT_URI "https://citybeach.smarbiz.sbs/accounts/apple/callback/"

          git fetch --depth 1 origin main
          git reset --hard FETCH_HEAD
          docker compose up -d --build --remove-orphans

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8022/health/ >/dev/null; then
              break
            fi
            sleep 3
          done
          curl -fsS http://127.0.0.1:8022/health/

          docker compose exec -T web python manage.py seed_demo
          docker compose exec -T web python manage.py shell <<'PY'
          import urllib.parse
          from allauth.socialaccount.models import SocialApp
          from django.conf import settings
          from django.test import Client
          from django.urls import resolve

          expected = 'https://citybeach.smarbiz.sbs/accounts/apple/callback/'
          assert settings.APPLE_LOGIN_ENABLED
          assert settings.APPLE_REDIRECT_URI == expected
          app = SocialApp.objects.get(provider='apple', client_id=settings.APPLE_CLIENT_ID)
          assert app.sites.filter(pk=settings.SITE_ID).exists()
          assert app.secret == settings.APPLE_KEY_ID
          assert app.key == settings.APPLE_TEAM_ID
          assert 'BEGIN PRIVATE KEY' in app.settings.get('certificate_key', '')
          assert resolve('/accounts/apple/callback/').url_name == 'apple_callback'

          client = Client(raise_request_exception=True, HTTP_HOST='citybeach.smarbiz.sbs')
          response = client.get('/accounts/apple/login/', secure=True)
          assert response.status_code in (301, 302, 303, 307, 308)
          parsed = urllib.parse.urlparse(response.headers['Location'])
          query = urllib.parse.parse_qs(parsed.query)
          assert parsed.scheme == 'https'
          assert parsed.netloc == 'appleid.apple.com'
          assert parsed.path.startswith('/auth/authorize')
          assert query.get('client_id', [''])[0] == settings.APPLE_CLIENT_ID
          assert query.get('redirect_uri', [''])[0] == expected
          print('CITYBEACH_APPLE_OK=1')
          PY

          rm -f /etc/nginx/sites-enabled/default /etc/nginx/sites-enabled/citybeach-public
          ln -sfn /etc/nginx/sites-available/citybeach /etc/nginx/sites-enabled/citybeach
          nginx -t
          systemctl reload nginx
          REMOTE

      - name: Produktionsstatus aktualisieren
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          success = os.environ['JOB_STATUS'] == 'success'
          body = (
              '## CityBeach Produktionsstatus\n\n'
              f"- Bereitstellung: **{'erfolgreich' if success else 'fehlgeschlagen'}**\n"
              f"- Apple-Anmeldung: **{'verbunden und geprüft' if success else 'nicht bestätigt'}**\n"
              '- Apple-Rücksprungadresse: `https://citybeach.smarbiz.sbs/accounts/apple/callback/`\n'
              f"- Stand: `{os.environ['SHA']}`\n"
              f"- Ausführung: {os.environ['RUN_URL']}\n"
              '- Adresse: https://citybeach.smarbiz.sbs\n'
          )
          request = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/issues/2",
              data=json.dumps({'body': body}).encode(),
              headers={
                  'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
                  'Accept': 'application/vnd.github+json',
                  'Content-Type': 'application/json',
              },
              method='PATCH',
          )
          urllib.request.urlopen(request).read()
          PY
