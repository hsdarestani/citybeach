name: CityBeach testen und bereitstellen

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt
      - name: Migrationen prüfen
        env:
          DJANGO_DEBUG: '1'
          DJANGO_ALLOWED_HOSTS: testserver,localhost,127.0.0.1
        run: |
          python manage.py makemigrations --check --dry-run
          python manage.py migrate --noinput
      - name: Automatische Prüfungen ausführen
        env:
          DJANGO_DEBUG: '1'
          DJANGO_ALLOWED_HOSTS: testserver,localhost,127.0.0.1
        run: python manage.py test -v 2
      - name: Statische Dateien sammeln
        env:
          DJANGO_DEBUG: '1'
          DJANGO_ALLOWED_HOSTS: testserver,localhost,127.0.0.1
        run: python manage.py collectstatic --noinput

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH-Werkzeug installieren
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Auf Hetzner bereitstellen
        env:
          HOST: ${{ secrets.HOST }}
          PASS: ${{ secrets.PASS }}
          DOMAIN: citybeach.smarbiz.sbs
          APPLE_SERVICE_ID: ${{ secrets.APPLE_SERVICE_ID }}
          APPLE_BUNDLE_ID: ${{ secrets.APPLE_BUNDLE_ID }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PRIVATE_KEY_B64: ${{ secrets.APPLE_PRIVATE_KEY_B64 }}
        run: |
          test -n "$HOST" && test -n "$PASS"
          sshpass -p "$PASS" ssh \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            root@"$HOST" "CITY_HOST='$HOST' CITY_DOMAIN='$DOMAIN' APPLE_SERVICE_ID='$APPLE_SERVICE_ID' APPLE_BUNDLE_ID='$APPLE_BUNDLE_ID' APPLE_KEY_ID='$APPLE_KEY_ID' APPLE_TEAM_ID='$APPLE_TEAM_ID' APPLE_PRIVATE_KEY_B64='$APPLE_PRIVATE_KEY_B64' bash -s" <<'REMOTE'
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive

          apt-get update
          apt-get install -y git curl docker.io docker-compose-v2 nginx openssl
          systemctl enable --now docker nginx

          APP_DIR=/root/citybeach
          ENV_FILE="$APP_DIR/.env"
          mkdir -p "$APP_DIR"
          cd "$APP_DIR"

          if [ ! -d .git ]; then
            git init
            git remote add origin https://github.com/hsdarestani/citybeach.git
          fi
          git fetch --depth 1 origin main
          git reset --hard FETCH_HEAD

          if [ ! -f "$ENV_FILE" ]; then
            DJANGO_KEY="$(openssl rand -base64 48 | tr -d '\n')"
            DB_PASSWORD="$(openssl rand -hex 24)"
            OWNER_PASSWORD="$(openssl rand -base64 18 | tr -dc 'A-Za-z0-9@!_-')"
            STAFF_PASSWORD="$(openssl rand -base64 18 | tr -dc 'A-Za-z0-9@!_-')"
            CUSTOMER_PASSWORD="$(openssl rand -base64 18 | tr -dc 'A-Za-z0-9@!_-')"
            printf '%s\n' \
              "DJANGO_SECRET_KEY=$DJANGO_KEY" \
              "DJANGO_DEBUG=0" \
              "DATABASE_URL=postgresql://citybeach:$DB_PASSWORD@db:5432/citybeach" \
              "POSTGRES_DB=citybeach" \
              "POSTGRES_USER=citybeach" \
              "POSTGRES_PASSWORD=$DB_PASSWORD" \
              "APP_PORT=8022" \
              "CITYBEACH_OWNER_PASSWORD=$OWNER_PASSWORD" \
              "CITYBEACH_STAFF_PASSWORD=$STAFF_PASSWORD" \
              "CITYBEACH_CUSTOMER_PASSWORD=$CUSTOMER_PASSWORD" > "$ENV_FILE"
            chmod 600 "$ENV_FILE"
          fi

          set_env() {
            key="$1"
            value="$2"
            if grep -q "^${key}=" "$ENV_FILE"; then
              sed -i "s|^${key}=.*|${key}=${value}|" "$ENV_FILE"
            else
              printf '%s=%s\n' "$key" "$value" >> "$ENV_FILE"
            fi
          }

          set_env DJANGO_ALLOWED_HOSTS "$CITY_DOMAIN,$CITY_HOST,127.0.0.1,localhost"
          set_env DJANGO_CSRF_TRUSTED_ORIGINS "https://$CITY_DOMAIN,http://$CITY_HOST"
          set_env APPLE_SERVICE_ID "$APPLE_SERVICE_ID"
          set_env APPLE_BUNDLE_ID "$APPLE_BUNDLE_ID"
          set_env APPLE_KEY_ID "$APPLE_KEY_ID"
          set_env APPLE_TEAM_ID "$APPLE_TEAM_ID"
          set_env APPLE_PRIVATE_KEY_B64 "$APPLE_PRIVATE_KEY_B64"

          docker compose up -d --build --remove-orphans
          docker compose exec -T web python manage.py seed_demo

          set -a
          . "$ENV_FILE"
          set +a
          printf '%s\n' \
            "CityBeach Frankfurt – Demozugänge" \
            "Adresse: https://$CITY_DOMAIN" \
            "Ersatzadresse: http://$CITY_HOST" \
            "Inhaber: owner / $CITYBEACH_OWNER_PASSWORD" \
            "Mitarbeiter: staff / $CITYBEACH_STAFF_PASSWORD" \
            "Kunde: customer / $CITYBEACH_CUSTOMER_PASSWORD" > "$APP_DIR/.initial-credentials"
          chmod 600 "$APP_DIR/.initial-credentials"

          if [ ! -f "/etc/letsencrypt/live/$CITY_DOMAIN/fullchain.pem" ]; then
            cat >/etc/nginx/sites-available/citybeach <<NGINX
          server {
              listen 80 default_server;
              listen [::]:80 default_server;
              server_name $CITY_DOMAIN $CITY_HOST _;
              client_max_body_size 20M;

              location / {
                  proxy_pass http://127.0.0.1:8022;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
              }
          }
          NGINX
          fi

          rm -f /etc/nginx/sites-enabled/default
          ln -sfn /etc/nginx/sites-available/citybeach /etc/nginx/sites-enabled/citybeach
          nginx -t
          systemctl reload nginx

          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8022/health/ >/dev/null; then break; fi
            sleep 3
          done
          curl -fsS http://127.0.0.1:8022/health/
          REMOTE

      - name: Ergebnis melden
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          BODY="CityBeach-Bereitstellung: **${JOB_STATUS}**%0A%0AStand: \`${SHA}\`%0AAusführung: ${RUN_URL}%0ADomain: https://citybeach.smarbiz.sbs%0AErsatzadresse: http://91.107.155.215"
          curl -fsS -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/2/comments" \
            -d "{\"body\":\"${BODY}\"}"
