name: CityBeach HTTPS-Ursprung reparieren

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: citybeach-origin-repair
  cancel-in-progress: true

jobs:
  repair-origin:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH-Werkzeug installieren
        run: sudo apt-get update && sudo apt-get install -y sshpass curl

      - name: Ursprung diagnostizieren und reparieren
        id: repair
        continue-on-error: true
        env:
          HOST: ${{ secrets.HOST }}
          PASS: ${{ secrets.PASS }}
          DOMAIN: citybeach.smarbiz.sbs
        run: |
          set -o pipefail
          test -n "$HOST" && test -n "$PASS"
          sshpass -p "$PASS" ssh \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            root@"$HOST" "CITY_HOST='$HOST' CITY_DOMAIN='$DOMAIN' bash -s" <<'REMOTE' 2>&1 | tee /tmp/origin-report.log
          set +e
          export DEBIAN_FRONTEND=noninteractive
          APP_DIR=/root/citybeach
          DOMAIN="$CITY_DOMAIN"

          echo '=== Ausgangslage ==='
          date -u
          uptime
          systemctl is-active docker || true
          systemctl is-active nginx || true
          ss -lntp || true

          echo '=== Pakete und Dienste ==='
          apt-get update
          apt-get install -y nginx certbot python3-certbot-nginx curl openssl docker.io docker-compose-v2
          systemctl enable --now docker

          echo '=== Firewall ==='
          if command -v ufw >/dev/null 2>&1; then
            ufw allow 22/tcp || true
            ufw allow 80/tcp || true
            ufw allow 443/tcp || true
            ufw status verbose || true
          fi
          iptables -C INPUT -p tcp --dport 80 -j ACCEPT 2>/dev/null || iptables -I INPUT 1 -p tcp --dport 80 -j ACCEPT
          iptables -C INPUT -p tcp --dport 443 -j ACCEPT 2>/dev/null || iptables -I INPUT 1 -p tcp --dport 443 -j ACCEPT

          echo '=== Anwendung ==='
          cd "$APP_DIR"
          docker compose up -d --remove-orphans || docker compose up -d --build --remove-orphans
          docker compose ps || true
          docker compose logs --tail=80 web || true

          APP_OK=0
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8022/health/; then
              APP_OK=1
              break
            fi
            sleep 2
          done
          echo "APP_OK=$APP_OK"

          echo '=== HTTP-Nginx ==='
          cat >/etc/nginx/sites-available/citybeach <<NGINX
          server {
              listen 80 default_server;
              listen [::]:80 default_server;
              server_name $DOMAIN $CITY_HOST _;
              client_max_body_size 20M;

              location / {
                  proxy_pass http://127.0.0.1:8022;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
              }
          }
          NGINX
          rm -f /etc/nginx/sites-enabled/default
          ln -sfn /etc/nginx/sites-available/citybeach /etc/nginx/sites-enabled/citybeach
          nginx -t
          systemctl enable --now nginx
          systemctl restart nginx
          curl -vfsS -H "Host: $DOMAIN" http://127.0.0.1/health/ || true

          echo '=== Zertifikat ==='
          CERT_OK=0
          if [ -f "/etc/letsencrypt/live/$DOMAIN/fullchain.pem" ] && [ -f "/etc/letsencrypt/live/$DOMAIN/privkey.pem" ]; then
            CERT_OK=1
            echo 'Vorhandenes Let’s-Encrypt-Zertifikat gefunden.'
          else
            certbot --nginx \
              --non-interactive \
              --agree-tos \
              --register-unsafely-without-email \
              --redirect \
              --keep-until-expiring \
              -d "$DOMAIN" && CERT_OK=1
          fi
          echo "CERT_OK=$CERT_OK"

          if [ "$CERT_OK" = '1' ]; then
            cat >/etc/nginx/sites-available/citybeach <<NGINX
          server {
              listen 80 default_server;
              listen [::]:80 default_server;
              server_name $DOMAIN $CITY_HOST _;
              return 301 https://$DOMAIN\$request_uri;
          }
          server {
              listen 443 ssl http2 default_server;
              listen [::]:443 ssl http2 default_server;
              server_name $DOMAIN $CITY_HOST _;
              client_max_body_size 20M;
              ssl_certificate /etc/letsencrypt/live/$DOMAIN/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/$DOMAIN/privkey.pem;
              include /etc/letsencrypt/options-ssl-nginx.conf;
              ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
              location / {
                  proxy_pass http://127.0.0.1:8022;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto https;
              }
          }
          NGINX
          else
            echo 'Let’s Encrypt nicht verfügbar; vorübergehendes Ursprungszertifikat wird erstellt.'
            mkdir -p /etc/nginx/ssl
            openssl req -x509 -nodes -newkey rsa:2048 -days 30 \
              -keyout /etc/nginx/ssl/citybeach.key \
              -out /etc/nginx/ssl/citybeach.crt \
              -subj "/CN=$DOMAIN" \
              -addext "subjectAltName=DNS:$DOMAIN"
            cat >/etc/nginx/sites-available/citybeach <<NGINX
          server {
              listen 80 default_server;
              listen [::]:80 default_server;
              server_name $DOMAIN $CITY_HOST _;
              location / {
                  proxy_pass http://127.0.0.1:8022;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Forwarded-Proto http;
              }
          }
          server {
              listen 443 ssl http2 default_server;
              listen [::]:443 ssl http2 default_server;
              server_name $DOMAIN $CITY_HOST _;
              ssl_certificate /etc/nginx/ssl/citybeach.crt;
              ssl_certificate_key /etc/nginx/ssl/citybeach.key;
              location / {
                  proxy_pass http://127.0.0.1:8022;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto https;
              }
          }
          NGINX
          fi

          nginx -t
          systemctl restart nginx

          echo '=== Ergebnis auf dem Ursprung ==='
          systemctl --no-pager --full status nginx | tail -40 || true
          ss -lntp | grep -E ':(80|443|8022) ' || true
          curl -vfsS -H "Host: $DOMAIN" http://127.0.0.1/health/ || true
          curl -vkfsS --resolve "$DOMAIN:443:127.0.0.1" "https://$DOMAIN/health/" || true

          [ "$APP_OK" = '1' ] && ss -lnt | grep -q ':80 ' && ss -lnt | grep -q ':443 '
          REMOTE

      - name: Öffentliche Erreichbarkeit prüfen
        id: public
        continue-on-error: true
        env:
          DOMAIN: citybeach.smarbiz.sbs
          HOST: ${{ secrets.HOST }}
        run: |
          {
            echo '=== Öffentlicher HTTP-Test des Ursprungs ==='
            curl -vfsS --connect-timeout 10 --max-time 25 -H "Host: $DOMAIN" "http://$HOST/health/" || true
            echo '=== Öffentlicher HTTPS-Test über Cloudflare ==='
            for i in $(seq 1 12); do
              if curl -vfsS --connect-timeout 10 --max-time 25 "https://$DOMAIN/health/"; then
                echo 'PUBLIC_OK=1'
                exit 0
              fi
              sleep 10
            done
            echo 'PUBLIC_OK=0'
            exit 1
          } 2>&1 | tee /tmp/public-report.log

      - name: Diagnose veröffentlichen
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPAIR_OUTCOME: ${{ steps.repair.outcome }}
          PUBLIC_OUTCOME: ${{ steps.public.outcome }}
        run: |
          python - <<'PY'
          import json, os, pathlib, urllib.request
          origin = pathlib.Path('/tmp/origin-report.log').read_text(errors='replace')[-12000:] if pathlib.Path('/tmp/origin-report.log').exists() else 'Kein Ursprungsbericht.'
          public = pathlib.Path('/tmp/public-report.log').read_text(errors='replace')[-5000:] if pathlib.Path('/tmp/public-report.log').exists() else 'Kein öffentlicher Bericht.'
          body = (
              f"## CityBeach HTTPS-Reparatur\n\n"
              f"- Ursprung: **{os.environ['REPAIR_OUTCOME']}**\n"
              f"- Öffentlicher Test: **{os.environ['PUBLIC_OUTCOME']}**\n"
              f"- Ausführung: {os.environ['RUN_URL']}\n\n"
              f"<details><summary>Ursprungsdiagnose</summary>\n\n```text\n{origin}\n```\n</details>\n\n"
              f"<details><summary>Öffentlicher Test</summary>\n\n```text\n{public}\n```\n</details>"
          )
          req = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/issues/5/comments",
              data=json.dumps({'body': body}).encode(),
              headers={'Authorization': f"Bearer {os.environ['GH_TOKEN']}", 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json'},
              method='POST',
          )
          urllib.request.urlopen(req).read()
          PY

      - name: Reparaturstatus erzwingen
        if: steps.repair.outcome == 'failure' || steps.public.outcome == 'failure'
        run: exit 1
