name: QR-Scanner sicher bereitstellen

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/qr-owner-hot-deploy.yml'

permissions:
  contents: read
  issues: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH-Werkzeug installieren
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
      - name: Geprüften Stand bereitstellen
        env:
          HOST: ${{ secrets.HOST }}
          PASS: ${{ secrets.PASS }}
        run: |
          set -euo pipefail
          test -n "$HOST"
          test -n "$PASS"
          sshpass -p "$PASS" ssh \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            root@"$HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail
          cd /root/citybeach
          git fetch --depth 1 origin main
          git reset --hard FETCH_HEAD

          # Das laufende Web bleibt während des Builds erreichbar.
          docker compose build web

          # Nur der Webdienst wird anschließend mit dem fertigen Image ersetzt.
          docker compose up -d --no-deps --force-recreate web

          ready=0
          for i in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:8022/health/ >/dev/null; then
              ready=1
              break
            fi
            sleep 2
          done

          if [ "$ready" != "1" ]; then
            docker compose ps
            docker compose logs --tail=160 web
            exit 1
          fi

          curl -fsS http://127.0.0.1:8022/health/
          docker compose exec -T web python manage.py shell -c "from django.urls import reverse; assert reverse('owner_wallet_scan') == '/owner/wallet/scan/'"
          REMOTE
      - name: Öffentliche Erreichbarkeit prüfen
        run: |
          for i in $(seq 1 20); do
            if curl -fsS https://citybeach.smarbiz.sbs/health/; then
              exit 0
            fi
            sleep 3
          done
          exit 1
      - name: Ergebnis melden
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          successful = os.environ['JOB_STATUS'] == 'success'
          body = (
              '## QR-Scanner Produktionsstatus\n\n'
              f"- Bereitstellung: **{'erfolgreich' if successful else 'fehlgeschlagen'}**\n"
              f"- Inhaber-QR-Scanner: **{'aktiv und geprüft' if successful else 'nicht bestätigt'}**\n"
              '- Bestehende Apple-Konfiguration und Datenbank: **unverändert**\n'
              f"- Stand: `{os.environ['SHA']}`\n"
              f"- Ausführung: {os.environ['RUN_URL']}\n"
              '- Adresse: https://citybeach.smarbiz.sbs\n'
          )
          request = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/issues/22",
              data=json.dumps({'body': body}).encode(),
              headers={
                  'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
                  'Accept': 'application/vnd.github+json',
                  'Content-Type': 'application/json',
              },
              method='PATCH',
          )
          urllib.request.urlopen(request).read()
          PY
