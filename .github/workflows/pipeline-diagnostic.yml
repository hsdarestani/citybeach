name: Pipeline-Schritte einzeln prüfen

on:
  pull_request:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      DJANGO_DEBUG: '1'
      DJANGO_ALLOWED_HOSTS: testserver,localhost,127.0.0.1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -q -r requirements.txt
      - name: Migrationen vergleichen
        run: python manage.py makemigrations --check --dry-run
      - name: Migrationen anwenden
        run: python manage.py migrate --noinput
      - name: Tests protokollieren
        id: tests
        shell: bash
        run: |
          set +e
          python manage.py test -v 2 > test-output.txt 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-test-output
          path: test-output.txt
      - name: Testergebnis übernehmen
        if: steps.tests.outputs.exit_code != '0'
        run: exit 1
