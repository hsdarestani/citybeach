name: CityBeach Apple-Diagnose

on:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH-Werkzeug installieren
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass >/dev/null

      - name: Production konfigurieren und prüfen
        id: activate
        continue-on-error: true
        env:
          HOST: ${{ secrets.HOST }}
          PASS: ${{ secrets.PASS }}
          APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_REDIRECT_URI_INPUT: ${{ secrets.APPLE_REDIRECT_URI }}
          APPLE_PRIVATE_KEY_INPUT: ${{ secrets.APPLE_PRIVATE_KEY_BASE64 }}
        run: |
          set -o pipefail
          test -n "$HOST" && test -n "$PASS"
          test -n "$APPLE_CLIENT_ID" && test -n "$APPLE_KEY_ID" && test -n "$APPLE_TEAM_ID"
          test -n "$APPLE_REDIRECT_URI_INPUT" && test -n "$APPLE_PRIVATE_KEY_INPUT"
          REDIRECT="${APPLE_REDIRECT_URI_INPUT%/}/"
          test "$REDIRECT" = 'https://citybeach.smarbiz.sbs/accounts/apple/login/callback/'

          if printf '%s' "$APPLE_PRIVATE_KEY_INPUT" | grep -q 'BEGIN PRIVATE KEY'; then
            KEY_B64="$(printf '%s' "$APPLE_PRIVATE_KEY_INPUT" | base64 -w 0)"
            KEY_FORMAT='raw-pem'
          else
            KEY_B64="$(printf '%s' "$APPLE_PRIVATE_KEY_INPUT" | tr -d '[:space:]')"
            KEY_FORMAT='base64'
          fi
          echo "Schlüsselformat erkannt: $KEY_FORMAT"
          echo "Schlüsselwert vorhanden: ja"

          sshpass -p "$PASS" ssh \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            root@"$HOST" "APPLE_CLIENT_ID='$APPLE_CLIENT_ID' APPLE_KEY_ID='$APPLE_KEY_ID' APPLE_TEAM_ID='$APPLE_TEAM_ID' APPLE_REDIRECT_URI='$REDIRECT' APPLE_PRIVATE_KEY_BASE64='$KEY_B64' bash -s" <<'REMOTE' 2>&1 | tee /tmp/apple-diagnostic.log
          set -euo pipefail
          echo 'STUFE_1_SSH_OK'
          cd /root/citybeach
          git fetch --depth 1 origin main
          git reset --hard FETCH_HEAD
          echo 'STUFE_2_CODE_OK'

          python3 - <<'PY'
          import os
          from pathlib import Path
          path = Path('/root/citybeach/.env')
          lines = path.read_text().splitlines() if path.exists() else []
          values = {
              'DJANGO_ALLOWED_HOSTS': 'citybeach.smarbiz.sbs,91.107.155.215,127.0.0.1,localhost',
              'DJANGO_CSRF_TRUSTED_ORIGINS': 'https://citybeach.smarbiz.sbs,http://91.107.155.215',
              'DJANGO_SECURE_COOKIES': '1',
              'DJANGO_HSTS_SECONDS': '31536000',
              'APPLE_CLIENT_ID': os.environ['APPLE_CLIENT_ID'],
              'APPLE_KEY_ID': os.environ['APPLE_KEY_ID'],
              'APPLE_TEAM_ID': os.environ['APPLE_TEAM_ID'],
              'APPLE_REDIRECT_URI': os.environ['APPLE_REDIRECT_URI'],
              'APPLE_PRIVATE_KEY_BASE64': os.environ['APPLE_PRIVATE_KEY_BASE64'],
          }
          obsolete = {'APPLE_SERVICE_ID', 'APPLE_PRIVATE_KEY_B64'}
          result, seen = [], set()
          for line in lines:
              key = line.split('=', 1)[0] if '=' in line else ''
              if key in obsolete:
                  continue
              if key in values:
                  result.append(f'{key}={values[key]}')
                  seen.add(key)
              else:
                  result.append(line)
          for key, value in values.items():
              if key not in seen:
                  result.append(f'{key}={value}')
          path.write_text('\n'.join(result) + '\n')
          path.chmod(0o600)
          PY
          echo 'STUFE_3_ENV_OK'

          docker compose up -d --build --remove-orphans
          echo 'STUFE_4_DOCKER_OK'
          docker compose exec -T web python manage.py seed_demo
          docker compose exec -T web python manage.py shell -c "from django.conf import settings; print('APPLE_LOGIN_ENABLED=', settings.APPLE_LOGIN_ENABLED); assert settings.APPLE_LOGIN_ENABLED; assert settings.APPLE_REDIRECT_URI == 'https://citybeach.smarbiz.sbs/accounts/apple/login/callback/'; assert 'BEGIN PRIVATE KEY' in settings.APPLE_PRIVATE_KEY"
          echo 'STUFE_5_DJANGO_APPLE_OK'
          curl -fsS http://127.0.0.1:8022/health/
          echo 'STUFE_6_HEALTH_OK'
          REMOTE

      - name: Live-Weiterleitung prüfen
        id: public
        if: steps.activate.outcome == 'success'
        continue-on-error: true
        env:
          APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
          APPLE_REDIRECT_URI: ${{ secrets.APPLE_REDIRECT_URI }}
        run: |
          python3 - <<'PY'
          import os, urllib.error, urllib.parse, urllib.request
          html = urllib.request.urlopen('https://citybeach.smarbiz.sbs/accounts/login/', timeout=30).read().decode(errors='replace')
          assert 'Mit Apple fortfahren' in html
          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, headers, newurl): return None
          opener = urllib.request.build_opener(NoRedirect)
          try:
              response = opener.open('https://citybeach.smarbiz.sbs/accounts/apple/login/', timeout=30)
              location = response.headers.get('Location', '')
          except urllib.error.HTTPError as exc:
              if exc.code not in (301, 302, 303, 307, 308): raise
              location = exc.headers.get('Location', '')
          parsed = urllib.parse.urlparse(location)
          query = urllib.parse.parse_qs(parsed.query)
          assert parsed.netloc == 'appleid.apple.com'
          assert query.get('client_id', [''])[0] == os.environ['APPLE_CLIENT_ID']
          assert query.get('redirect_uri', [''])[0] == os.environ['APPLE_REDIRECT_URI'].rstrip('/') + '/'
          print('STUFE_7_APPLE_REDIRECT_OK')
          PY

      - name: Diagnose in Issue 15 veröffentlichen
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          ACTIVATE: ${{ steps.activate.outcome }}
          PUBLIC: ${{ steps.public.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json, os, pathlib, urllib.request
          log = pathlib.Path('/tmp/apple-diagnostic.log').read_text(errors='replace')[-7000:] if pathlib.Path('/tmp/apple-diagnostic.log').exists() else 'Kein Serverprotokoll.'
          body = (
              '## CityBeach Apple-Diagnose\n\n'
              f"- Serveraktivierung: **{os.environ['ACTIVATE']}**\n"
              f"- Öffentliche Apple-Weiterleitung: **{os.environ['PUBLIC']}**\n"
              f"- Ausführung: {os.environ['RUN_URL']}\n\n"
              f"```text\n{log}\n```"
          )
          req = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/issues/15",
              data=json.dumps({'body': body}).encode(),
              headers={'Authorization': f"Bearer {os.environ['GH_TOKEN']}", 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json'},
              method='PATCH',
          )
          urllib.request.urlopen(req).read()
          PY

      - name: Ergebnis erzwingen
        if: steps.activate.outcome != 'success' || steps.public.outcome != 'success'
        run: exit 1
