name: Verify CityBeach Public Health
on:
  workflow_run:
    workflows: ["Test and Deploy CityBeach"]
    types: [completed]
permissions:
  contents: read
  issues: write
jobs:
  verify:
    if: github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Verify public endpoint
        id: health
        run: |
          curl -fsS --connect-timeout 10 --max-time 20 --retry 5 --retry-delay 5 http://91.107.155.215/health/
      - name: Report public health result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BODY="CityBeach public health check: **${STATUS}**%0A%0AEndpoint: http://91.107.155.215/health/%0ARun: ${RUN_URL}"
          curl -fsS -X POST -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/2/comments" -d "{\"body\":\"${BODY}\"}"
